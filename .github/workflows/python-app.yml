name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install nuitka zstandard
      - run: python -m nuitka --standalone --onefile test.py
      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: test.exe
