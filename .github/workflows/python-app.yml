name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install nuitka zstandard pandas PyQt6 requests beautifulsoup4 pycryptodome lxml openpyxl
      
      # 安装依赖分析工具
      - run: choco install dependencywalker -y || true
      
      # Nuitka 编译（包含图标和资源文件）
      - run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyqt6 `
            --windows-disable-console `
            --windows-icon-from-ico=app_icon.ico `
            --include-data-files=app_icon.ico=app_icon.ico `
            --assume-yes-for-downloads `
            --jobs=4 `
            key_management_system_v5.py
      
      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: guangzhou_line5_timetable.exe
