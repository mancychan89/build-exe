name: Build EXE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'  # 启用 pip 缓存加速

      # 安装依赖库
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install nuitka zstandard
          pip install PyQt6 pyautogui pygetwindow pyperclip xlrd pandas barcode pillow

      # Nuitka 编译
      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --enable-plugin=pyqt6 `
            --windows-disable-console `
            --windows-icon-from-ico=app_icon.ico `
            --include-data-files=app_icon.ico=app_icon.ico `
            --include-data-files=msyh.ttc=msyh.ttc `
            --assume-yes-for-downloads `
            --lto=no `
            --jobs=4 `
            key_management_system_v5.py

      # 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 还你门匙-exe
          path: key_management_system_v5.exe
          retention-days: 30  # 保留30天

      # 可选：创建 Release（仅在打标签时）
      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: key_management_system_v5.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
